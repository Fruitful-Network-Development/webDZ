<script>
(function () {
  var btn = document.getElementById('sidebar-signup-btn');
  if (!btn) return;
  btn.addEventListener('click', function () {
    var msg = document.getElementById('sidebar-signup-msg');
    msg.textContent = 'Redirecting to PayPal...';
    fetch('/paypal/checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        amount: '25.00',
        currency: 'USD',
        description: 'Fruitful Network Development -- Signup'
      })
    }).then(function (r) { return r.json(); }).then(function (d) {
      if (d.approval_url) {
        window.location.href = d.approval_url;
      } else {
        msg.textContent = d.error || 'Could not start checkout.';
      }
    }).catch(function () { msg.textContent = 'Network error.'; });
  });
})();
</script>

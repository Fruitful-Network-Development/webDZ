name: Structured Data Validation

on:
  pull_request:
    paths:
      - 'clients/fruitfulnetworkdevelopment.com/frontend/**/*.html'
      - 'clients/fruitfulnetworkdevelopment.com/frontend/assets/seo/**/*.json'
      - 'clients/fruitfulnetworkdevelopment.com/frontend/scripts/*.py'
      - '.github/workflows/structured-data-validation.yml'
  workflow_dispatch:

jobs:
  validate-structured-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate canonical + JSON-LD manifest rendering
        run: |
          python clients/fruitfulnetworkdevelopment.com/frontend/scripts/validate_structured_data.py

      - name: Run structured-data-testing-tool checks
        run: |
          set -euo pipefail
          for page in \
            clients/fruitfulnetworkdevelopment.com/frontend/index.html \
            clients/fruitfulnetworkdevelopment.com/frontend/services.html \
            clients/fruitfulnetworkdevelopment.com/frontend/subpages/articles.html
          do
            npx --yes structured-data-testing-tool --file "$page" -i | tee /tmp/sdtt.log
            grep -Eq "Schemas in JSON-LD: [1-9]" /tmp/sdtt.log
          done

server {
    server_name api.fruitfulnetworkdevelopment.com;

    # Flask BFF via localhost-only published port from Docker
    location / {
        proxy_pass http://127.0.0.1:8001;
        include /etc/nginx/sites-available/snippets/proxy_common.conf;

        # Useful if you later add websockets or SSE
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/api.fruitfulnetworkdevelopment.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api.fruitfulnetworkdevelopment.com/privkey.pem; # managed by Certbot
    include /etc/nginx/sites-available/snippets/ssl_params.conf; # managed by Certbot
}

server {
    listen 80;
    server_name api.fruitfulnetworkdevelopment.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    return 301 https://$host$request_uri;
}

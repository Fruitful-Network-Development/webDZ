services:
  keycloak_db:
    image: postgres:16
    container_name: keycloak_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks: [platform_net]

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    restart: unless-stopped
    depends_on: [keycloak_db]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

      KC_DB: postgres
      KC_DB_URL_HOST: keycloak_db
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}

      # Proxy / hostname correctness behind NGINX
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME: auth.fruitfulnetworkdevelopment.com
      KC_HOSTNAME_STRICT: "true"
      # Ensure generated URLs are HTTPS (and do not include :8081)
      KC_HOSTNAME_URL: https://auth.fruitfulnetworkdevelopment.com
      KC_HOSTNAME_ADMIN_URL: https://auth.fruitfulnetworkdevelopment.com
    command: ["start"]
    ports:
      - "127.0.0.1:8081:8080"
    networks: [platform_net]

  flask_bff:
    build:
      context: ./flask-bff
    container_name: flask_bff
    restart: unless-stopped
    depends_on:
      platform_db:
        condition: service_healthy
    environment:
      # OIDC
      OIDC_ISSUER: https://auth.fruitfulnetworkdevelopment.com/realms/${KC_REALM}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}

      # Session signing
      SESSION_SECRET: ${SESSION_SECRET}

      # Public base URL (used for redirects/callback URLs)
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}

      # Cookie policy: MUST be true when api.* is served over HTTPS (Phase 4)
      COOKIE_SECURE: ${COOKIE_SECURE}

      PLATFORM_DB_URL: ${PLATFORM_DB_URL}

    ports:
      - "127.0.0.1:8001:8000"
    networks: [platform_net]

  platform_db:
    container_name: platform_db
    image: postgres:16
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: platform
    volumes:
      - platform_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "platform"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  keycloak_db_data:
  platform_db_data:

networks:
  platform_net:
    driver: bridge

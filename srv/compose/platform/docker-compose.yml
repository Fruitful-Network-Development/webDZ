services:
  keycloak_db:
    image: postgres:16
    container_name: keycloak_db
    # While still in Phase 3 of Migration
    # restart: unless-stopped
    restart: "no"
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks: [platform_net]

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    # While still in Phase 3 of Migration
    # restart: unless-stopped
    restart: "no"
    depends_on: [keycloak_db]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

      KC_DB: postgres
      KC_DB_URL_HOST: keycloak_db
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}

      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
      KC_HOSTNAME: auth.fruitfulnetworkdevelopment.com
      KC_HOSTNAME_STRICT: "true"
      KC_PROXY_HEADERS: xforwarded
    command: ["start"]
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
    networks: [platform_net]

  platform_db:
    image: postgres:16
    container_name: platform_db
    # While still in Phase 3 of Migration
    # restart: unless-stopped
    restart: "no"
    environment:
      POSTGRES_DB: platform
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: ${PLATFORM_DB_PASSWORD}
    volumes:
      - platform_db_data:/var/lib/postgresql/data
    networks: [platform_net]

  # One-time schema init job (best-practice early stage)
  platform_schema:
    image: postgres:16
    container_name: platform_schema
    depends_on: [platform_db]
    environment:
      PGPASSWORD: ${PLATFORM_DB_PASSWORD}
    volumes:
      - ./platform-schema:/schema:ro
    entrypoint: ["/bin/bash","-lc"]
    command: >
      "psql -h platform_db -U platform -d platform -f /schema/001_init.sql
       && echo 'platform schema ok'"
    # While still in Phase 3 of Migration
    # restart: unless-stopped
    restart: "no"
    networks: [platform_net]

  flask_bff:
    build:
      context: ./flask-bff
    container_name: flask_bff
    # While still in Phase 3 of Migration
    # restart: unless-stopped
    restart: "no"
    depends_on:
      - keycloak
      - platform_db
      - platform_schema
    environment:
      DATABASE_URL: postgresql+psycopg://platform:${PLATFORM_DB_PASSWORD}@platform_db:5432/platform
      OIDC_ISSUER: https://auth.fruitfulnetworkdevelopment.com/realms/${KC_REALM}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      PUBLIC_BASE_URL: http://localhost:8001
    ports:
      - "127.0.0.1:8001:8000"
    networks: [platform_net]

volumes:
  keycloak_db_data:
  keycloak_data:
  platform_db_data:

networks:
  platform_net:
    driver: bridge
networks:
  platform_net:
    driver: bridge
